<!DOCTYPE html>
<html>
<head>
<title>Voting System</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#c84cff,#ff69b4);
    font-family:Arial;
}

.box{
    background:white;
    padding:20px;
    border-radius:15px;
    width:90%;
    max-width:500px;
    text-align:center;
}

button{
    margin:5px;
    padding:10px;
    background:#a020f0;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.result{
    margin-top:20px;
    text-align:left;
}
</style>
</head>

<body>

<div class="box" id="app">

<h3>Enter Roll (121–150)</h3>
<input type="number" id="roll"><br><br>
<button onclick="start()">Continue</button>

</div>

<script>
let voted = JSON.parse(localStorage.getItem("votes") || "{}");

function start(){
    let roll = document.getElementById("roll").value;

    if(roll < 121 || roll > 150){
        alert("Invalid Roll");
        return;
    }

    if(voted[roll]){
        showResults();
        return;
    }

    showQuestion(roll);
}

function showQuestion(roll){
    app.innerHTML = `
        <h3>What do you want for the betterment of the system?</h3>

        <button onclick="vote(${roll}, 'ELECTION')">I want ELECTION</button><br>
        <button onclick="vote(${roll}, 'NO ELECTION')">I do not want ELECTION</button>
    `;
}

function vote(roll, choice){
    voted[roll] = choice;
    localStorage.setItem("votes", JSON.stringify(voted));

    showResults();
}

function showResults(){

    let election = [];
    let noElection = [];

    for(let r in voted){
        if(voted[r] === "ELECTION") election.push(r);
        else noElection.push(r);
    }

    app.innerHTML = `
        <h2>RESULTS</h2>

        <h3>✅ ELECTION (${election.length})</h3>
        <div>${election.join(", ") || "No votes yet"}</div>

        <h3>❌ NO ELECTION (${noElection.length})</h3>
        <div>${noElection.join(", ") || "No votes yet"}</div>

        <br>
        <button onclick="reset()">Reset (Clear All)</button>
    `;
}

function reset(){
    localStorage.removeItem("votes");
    location.reload();
}
</script>

</body>
</html>
